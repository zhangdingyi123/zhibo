# 80 端口统一网关（ECS 上由独立 nginx 容器挂载）
# 注意：upstream 只保留 zhibo-backend，不要写 zhibo-backend-2

upstream zhibo_api {
    server zhibo-backend:8081;
}

upstream zhibo_web {
    server zhibo-frontend:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://zhibo_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://zhibo_api;
    }

    location /monitor/ {
        proxy_pass http://zhibo-grafana:3000/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://zhibo_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
